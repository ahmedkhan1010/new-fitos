<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>
<div class="app-shell" id="page" style="display:none">
  <div class="main-content">
    <div class="topbar">
      <div class="page-title"><h1>Profile</h1><p>Your fitness identity</p></div>
      <div class="topbar-actions">
        <button class="hamburger" id="hamburger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <button class="btn btn-primary btn-sm" id="save-btn">Save Changes</button>
      </div>
    </div>

    <div class="page-content">
      <!-- Avatar card -->
      <div class="card card-brand" style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
        <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#000;flex-shrink:0" id="profile-avatar">?</div>
        <div>
          <div id="profile-name-display" style="font-size:1.375rem;font-weight:800">Loading…</div>
          <div id="profile-email-display" style="font-size:.875rem;color:var(--text-2)"></div>
          <div id="profile-goal-display" style="font-size:.8125rem;color:var(--brand);margin-top:2px;font-weight:600"></div>
        </div>
      </div>

      <!-- Form -->
      <div class="card" style="margin-bottom:20px">
        <div class="section-title" style="margin-bottom:16px">Personal Information</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" id="f-name" class="form-control"/>
          </div>
          <div class="form-group">
            <label class="form-label">Age</label>
            <input type="number" id="f-age" class="form-control" min="14" max="80"/>
          </div>
          <div class="form-group">
            <label class="form-label">Weight (kg)</label>
            <input type="number" id="f-weight" class="form-control" step="0.1"/>
          </div>
          <div class="form-group">
            <label class="form-label">Height (cm)</label>
            <input type="number" id="f-height" class="form-control"/>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="section-title" style="margin-bottom:16px">Training Profile</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group">
            <label class="form-label">Primary Goal</label>
            <select id="f-goal" class="form-control">
              <option>Build Muscle</option><option>Lose Fat</option><option>Increase Strength</option>
              <option>Improve Endurance</option><option>Athletic Performance</option><option>General Fitness</option>
              <option>Maintain Current Fitness</option><option>Improve Mobility</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Fitness Level</label>
            <select id="f-level" class="form-control">
              <option>Complete Beginner</option><option>Beginner (some experience)</option>
              <option>Intermediate (1-2 years)</option><option>Advanced (3+ years)</option><option>Elite / Competitive</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Training Days per Week</label>
            <select id="f-days" class="form-control">
              <option value="2">2 days</option><option value="3">3 days</option><option value="4">4 days</option>
              <option value="5">5 days</option><option value="6">6 days</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Diet Type</label>
            <select id="f-diet" class="form-control">
              <option>Omnivore (everything)</option><option>Vegetarian</option><option>Vegan</option>
              <option>Eggetarian</option><option>Keto / Low Carb</option><option>High Protein Priority</option>
              <option>Intermittent Fasting</option><option>No Specific Diet</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="section-title" style="margin-bottom:16px">Injuries & Limitations</div>
        <div class="form-group">
          <label class="form-label">Any active injuries or limitations?</label>
          <textarea id="f-injuries" class="form-control" rows="2" placeholder="e.g. Lower back pain, knee issues…"></textarea>
        </div>
      </div>

      <!-- Stats -->
      <div class="card">
        <div class="section-title" style="margin-bottom:16px">Your Stats</div>
        <div class="metric-grid">
          <div class="metric-card"><div class="metric-label">Member Since</div><div id="stat-since" class="metric-value" style="font-size:1rem">—</div></div>
          <div class="metric-card"><div class="metric-label">Workouts Logged</div><div id="stat-workouts" class="metric-value">0</div></div>
          <div class="metric-card"><div class="metric-label">Days on FitOS</div><div id="stat-days" class="metric-value">0</div></div>
          <div class="metric-card"><div class="metric-label">BMI</div><div id="stat-bmi" class="metric-value">—</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="nav.js"></script>
<script>
let profile;

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  profile = await FS.getProfile(user.uid);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  buildNav('profile.html');

  if (profile) {
    document.getElementById('profile-avatar').textContent = (profile.name||'?').charAt(0).toUpperCase();
    document.getElementById('profile-name-display').textContent = profile.name || 'Athlete';
    document.getElementById('profile-email-display').textContent = user.email;
    document.getElementById('profile-goal-display').textContent = profile.primaryGoal || '';

    document.getElementById('f-name').value   = profile.name || '';
    document.getElementById('f-age').value    = profile.age || '';
    document.getElementById('f-weight').value = profile.weight || '';
    document.getElementById('f-height').value = profile.height || '';
    setSelect('f-goal',  profile.primaryGoal);
    setSelect('f-level', profile.fitnessLevel);
    document.getElementById('f-days').value   = profile.workoutDays || 4;
    setSelect('f-diet',  profile.diet);
    document.getElementById('f-injuries').value = Array.isArray(profile.injuries) ? profile.injuries.join(', ') : (profile.injuries || '');

    // Stats
    if (profile.createdAt?.toDate) {
      const d = profile.createdAt.toDate();
      document.getElementById('stat-since').textContent = d.toLocaleDateString('en-IN',{month:'short',year:'numeric'});
      document.getElementById('stat-days').textContent = Math.floor((Date.now()-d)/86400000);
    }
    if (profile.weight && profile.height) {
      const bmi = (profile.weight / Math.pow(profile.height/100, 2)).toFixed(1);
      document.getElementById('stat-bmi').textContent = bmi;
    }
  }

  const logs = await FS.getWorkoutLogs(user.uid, 999);
  document.getElementById('stat-workouts').textContent = logs.length;
});

function setSelect(id, value) {
  const el = document.getElementById(id);
  for (const opt of el.options) { if (opt.value === value || opt.text === value) { el.value = opt.value; break; }}
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const user = auth.currentUser;
  if (!user) return;
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    await FS.saveProfile(user.uid, {
      name:         document.getElementById('f-name').value.trim(),
      age:          parseInt(document.getElementById('f-age').value)||profile?.age,
      weight:       parseFloat(document.getElementById('f-weight').value)||profile?.weight,
      height:       parseFloat(document.getElementById('f-height').value)||profile?.height,
      primaryGoal:  document.getElementById('f-goal').value,
      fitnessLevel: document.getElementById('f-level').value,
      workoutDays:  parseInt(document.getElementById('f-days').value),
      diet:         document.getElementById('f-diet').value,
      injuries:     document.getElementById('f-injuries').value.trim(),
    });
    showToast('Profile updated!', 'success');
    document.getElementById('profile-name-display').textContent = document.getElementById('f-name').value;
    document.getElementById('profile-avatar').textContent = document.getElementById('f-name').value.charAt(0).toUpperCase();
  } catch(e) {
    showToast('Error saving profile.', 'error');
  }
  btn.textContent = 'Save Changes'; btn.disabled = false;
});
</script>
</body>
</html>
