<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Create Account — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<div class="auth-page" id="page" style="display:none">
  <div class="auth-card animate-up">
    <div class="auth-logo">
      <div class="logo-mark">F</div>
      <span class="logo-text">Fit<span>OS</span></span>
    </div>
    <h1 class="auth-title">Start your journey</h1>
    <p class="auth-sub">Free forever. Firebase-powered. No card needed.</p>

    <button class="btn btn-secondary btn-full" id="google-btn" style="gap:10px">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>

    <div class="auth-divider">or sign up with email</div>

    <form id="signup-form">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" id="name" class="form-control" placeholder="Alex Johnson" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8"/>
          <div class="input-hint">At least 8 characters</div>
        </div>
        <div style="display:flex;align-items:flex-start;gap:10px;padding:4px 0">
          <input type="checkbox" id="agree" style="margin-top:2px;flex-shrink:0" required/>
          <label for="agree" style="font-size:.8125rem;color:var(--text-2);cursor:pointer">
            I agree to the <a href="terms.html" style="color:var(--brand)">Terms of Service</a> and <a href="privacy.html" style="color:var(--brand)">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">Create Account →</button>
      </div>
    </form>

    <div id="error-msg" style="display:none" class="alert alert-danger mt-3"></div>

    <p class="auth-footer">Already have an account? <a href="login.html">Sign in →</a></p>
  </div>
</div>

<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script>
const loadingEl = document.getElementById('loading');
const pageEl    = document.getElementById('page');
const errorEl   = document.getElementById('error-msg');
let handledRoute = false;

async function ensureUserProfile(user) {
  let profile = await FS.getProfile(user.uid);
  if (!profile) {
    profile = await FS.ensureProfile(user.uid, {
      name: user.displayName || user.email?.split('@')[0] || 'Athlete',
      email: user.email || '',
      onboardingDone: false,
    });
  }
  return profile;
}

async function routeUser(user) {
  if (handledRoute || !user) return;
  handledRoute = true;
  const profile = await ensureUserProfile(user);
  window.location.href = profile?.onboardingDone ? 'dashboard.html' : 'onboarding.html';
}

const redirectResult = auth.getRedirectResult().catch(() => null);
redirectResult.then(result => {
  if (result?.user) routeUser(result.user);
});

auth.onAuthStateChanged(async user => {
  if (user) { routeUser(user); }
  else if (!handledRoute) {
    loadingEl.style.display = 'none';
    pageEl.style.display = 'flex';
  }
});

function friendly(code) {
  const map = {
    'auth/email-already-in-use': 'That email already has an account.',
    'auth/weak-password':        'Password must be at least 8 characters.',
    'auth/operation-not-allowed':'Email signup is not enabled. Contact support.',
  };
  return map[code] || 'Signup failed. Please try again.';
}

document.getElementById('signup-form').addEventListener('submit', async e => {
  e.preventDefault();
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('signup-btn');
  btn.textContent = 'Creating account…'; btn.disabled = true;
  errorEl.style.display = 'none';
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });
    await FS.ensureProfile(cred.user.uid, {
      name, email, onboardingDone: false, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    logEvent('sign_up', { method:'email' });
    window.location.href = 'onboarding.html';
  } catch(err) {
    errorEl.style.display = 'block';
    errorEl.textContent = friendly(err.code);
    btn.textContent = 'Create Account →'; btn.disabled = false;
  }
});

document.getElementById('google-btn').addEventListener('click', async () => {
  try {
    const result = await auth.signInWithPopup(googleProvider);
    const user = result.user;
    await ensureUserProfile(user);
    logEvent('sign_up', { method:'google' });
    window.location.href = 'onboarding.html';
  } catch(err) {
    if (err.code === 'auth/popup-blocked' || err.code === 'auth/operation-not-supported-in-this-environment') {
      await auth.signInWithRedirect(googleProvider);
      return;
    }
    if (err.code !== 'auth/popup-closed-by-user') {
      errorEl.style.display = 'block';
      errorEl.textContent = 'Google sign-up failed. Please try again.';
    }
  }
});
</script>
</body>
</html>
