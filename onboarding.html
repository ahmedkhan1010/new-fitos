<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Setup Your Profile — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<div class="onboard-page" id="page" style="display:none">
  <div class="onboard-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-mark" style="width:28px;height:28px;font-size:12px">F</div>
      <span class="logo-text" style="font-size:1rem">Fit<span>OS</span></span>
    </div>
    <div class="onboard-step-indicator">Step <span id="cur-step">1</span> of 13</div>
  </div>
  <div class="onboard-progress"><div class="onboard-progress-fill" id="progress-fill" style="width:7.7%"></div></div>

  <div class="onboard-body" id="onboard-body"></div>

  <div style="width:100%;padding:20px 24px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end;max-width:520px;margin:0 auto">
    <button class="btn btn-secondary" id="back-btn" style="display:none">← Back</button>
    <button class="btn btn-primary" id="next-btn" style="min-width:120px">Continue →</button>
  </div>
</div>

<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script>
let currentUser = null;
let step = 1;
const TOTAL = 13;
const answers = {};

const STEPS = [
  {
    id:'name', question:"What's your name?", hint:'This is how FitOS will address you.',
    type:'text', placeholder:'Your first name', key:'name'
  },
  {
    id:'age', question:'How old are you?', hint:'Used to calibrate intensity and recovery rates.',
    type:'number', placeholder:'e.g. 27', key:'age', min:14, max:80
  },
  {
    id:'gender', question:"What's your biological sex?", hint:'Used for calorie and hormone-based calculations.',
    type:'chips', key:'gender', options:['Male','Female','Prefer not to say']
  },
  {
    id:'weight', question:"What's your current weight?",
    hint:'Enter in kg. You can update this anytime.',
    type:'weight', key:'weight'
  },
  {
    id:'height', question:"What's your height?",
    hint:'Enter in cm. Used for BMR calculation.',
    type:'number', placeholder:'e.g. 175', key:'height', min:100, max:250, suffix:'cm'
  },
  {
    id:'primaryGoal', question:'What is your primary fitness goal?', hint:'Be honest — your plan is built around this.',
    type:'chips', key:'primaryGoal',
    options:['Build Muscle','Lose Fat','Increase Strength','Improve Endurance','Athletic Performance','General Fitness','Maintain Current Fitness','Improve Mobility']
  },
  {
    id:'fitnessLevel', question:'How would you rate your current fitness level?', hint:'No judgment — this helps us calibrate starting weights.',
    type:'chips', key:'fitnessLevel',
    options:['Complete Beginner','Beginner (some experience)','Intermediate (1-2 years)','Advanced (3+ years)','Elite / Competitive']
  },
  {
    id:'equipment', question:'What equipment do you have access to?', hint:'Select all that apply.',
    type:'chips', key:'equipment', multi:true,
    options:['Full Gym','Home Gym','Dumbbells Only','Resistance Bands','Barbell & Plates','Pull-up Bar','Bodyweight Only','Kettlebells']
  },
  {
    id:'workoutDays', question:'How many days per week can you train?', hint:'Be realistic — consistency beats intensity.',
    type:'chips', key:'workoutDays',
    options:['2 days','3 days','4 days','5 days','6 days']
  },
  {
    id:'workoutDuration', question:'How long can you train per session?', hint:'Including warm-up and cool-down.',
    type:'chips', key:'workoutDuration',
    options:['30 minutes','45 minutes','60 minutes','75 minutes','90+ minutes']
  },
  {
    id:'injuries', question:'Do you have any injuries or physical limitations?', hint:'Select all that apply. We will program around these.',
    type:'chips', key:'injuries', multi:true,
    options:['No injuries','Lower Back Pain','Knee Issues','Shoulder Injury','Hip Flexor Tightness','Wrist / Elbow Pain','Ankle Issues','Post-Surgery Recovery']
  },
  {
    id:'lifestyle', question:'How would you describe your daily lifestyle?', hint:'Outside of workouts — affects calorie targets.',
    type:'chips', key:'lifestyle',
    options:['Sedentary (desk job, little movement)','Lightly Active (some walking)','Moderately Active (on feet often)','Very Active (physical job or sport)','Extremely Active (athlete or manual labor)']
  },
  {
    id:'diet', question:'How do you primarily eat?', hint:'Helps us set your macro targets.',
    type:'chips', key:'diet',
    options:['Omnivore (everything)','Vegetarian','Vegan','Eggetarian','Keto / Low Carb','High Protein Priority','Intermittent Fasting','No Specific Diet']
  },
];

function render() {
  const s = STEPS[step - 1];
  const body = document.getElementById('onboard-body');
  document.getElementById('cur-step').textContent = step;
  document.getElementById('progress-fill').style.width = `${(step / TOTAL) * 100}%`;
  document.getElementById('back-btn').style.display = step > 1 ? 'inline-flex' : 'none';
  const btn = document.getElementById('next-btn');
  btn.textContent = step === TOTAL ? '🚀 Build My Plan' : 'Continue →';

  let html = `<div class="onboard-question">${s.question}</div><div class="onboard-hint">${s.hint}</div>`;

  if (s.type === 'text') {
    html += `<input type="text" id="ob-input" class="form-control" style="font-size:1.125rem;padding:14px 16px" placeholder="${s.placeholder}" value="${answers[s.key]||''}"/>`;
  } else if (s.type === 'number') {
    html += `<div style="display:flex;align-items:center;gap:12px">
      <input type="number" id="ob-input" class="form-control" style="font-size:1.25rem;padding:14px 16px;max-width:200px" placeholder="${s.placeholder}" value="${answers[s.key]||''}" min="${s.min||0}" max="${s.max||999}"/>
      ${s.suffix ? `<span style="font-size:1rem;color:var(--text-2)">${s.suffix}</span>` : ''}
    </div>`;
  } else if (s.type === 'weight') {
    html += `<div style="display:flex;align-items:center;gap:16px">
      <button class="step-btn" id="dec-btn">−</button>
      <span class="step-value" id="weight-val">${answers.weight||70}</span>
      <button class="step-btn" id="inc-btn">+</button>
      <span style="color:var(--text-2);font-size:1rem">kg</span>
    </div>`;
    if (!answers.weight) answers.weight = 70;
  } else if (s.type === 'chips') {
    const selected = answers[s.key] ? (Array.isArray(answers[s.key]) ? answers[s.key] : [answers[s.key]]) : [];
    html += `<div class="chip-grid" id="chip-grid">
      ${s.options.map(opt => `<button class="chip ${selected.includes(opt)?'selected':''}" data-val="${opt}">${opt}</button>`).join('')}
    </div>`;
  }

  body.innerHTML = html;
  body.classList.remove('animate-up'); void body.offsetWidth; body.classList.add('animate-up');

  // Weight stepper
  if (s.type === 'weight') {
    document.getElementById('dec-btn').addEventListener('click', () => { answers.weight = Math.max(30, (answers.weight||70) - 1); document.getElementById('weight-val').textContent = answers.weight; });
    document.getElementById('inc-btn').addEventListener('click', () => { answers.weight = Math.min(250, (answers.weight||70) + 1); document.getElementById('weight-val').textContent = answers.weight; });
  }

  // Chip selection
  if (s.type === 'chips') {
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const val = chip.dataset.val;
        if (s.multi) {
          let arr = Array.isArray(answers[s.key]) ? [...answers[s.key]] : [];
          if (arr.includes(val)) arr = arr.filter(v => v !== val);
          else arr.push(val);
          answers[s.key] = arr;
          chip.classList.toggle('selected');
        } else {
          answers[s.key] = val;
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
        }
      });
    });
  }
}

function validate() {
  const s = STEPS[step - 1];
  if (s.type === 'text') {
    const val = document.getElementById('ob-input')?.value.trim();
    if (!val) { showToast('Please enter your ' + s.key, 'error'); return false; }
    answers[s.key] = val;
  } else if (s.type === 'number') {
    const raw = document.getElementById('ob-input')?.value;
    const val = parseInt(raw);
    if (!raw || isNaN(val)) { showToast('Please enter a valid number', 'error'); return false; }
    if (s.min !== undefined && val < s.min) { showToast(`Minimum value is ${s.min}`, 'error'); return false; }
    if (s.max !== undefined && val > s.max) { showToast(`Maximum value is ${s.max}`, 'error'); return false; }
    answers[s.key] = val;
  } else if (s.type === 'chips') {
    if (!answers[s.key] || (Array.isArray(answers[s.key]) && answers[s.key].length === 0)) {
      showToast('Please select at least one option', 'error'); return false;
    }
  }
  return true;
}

document.getElementById('next-btn').addEventListener('click', async () => {
  if (!validate()) return;
  if (step < TOTAL) { step++; render(); return; }
  // Final step — save to Firestore and generate plan
  const btn = document.getElementById('next-btn');
  btn.textContent = 'Building your plan…'; btn.disabled = true;
  try {
    const days = parseInt((answers.workoutDays || '4 days').split(' ')[0]);
    const profile = {
      ...answers,
      workoutDays: days,
      onboardingDone: true,
      onboardingCompletedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await FS.saveProfile(currentUser.uid, profile);
    // Generate and store initial workout plan
    const plan = generatePlan({ ...profile });
    await FS.createPlan(currentUser.uid, plan);
    logEvent('onboarding_complete', { uid: currentUser.uid, goal: answers.primaryGoal });
    showToast('Profile saved! Loading your dashboard…', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
  } catch(err) {
    console.error(err);
    showToast('Error saving profile. Please try again.', 'error');
    btn.textContent = '🚀 Build My Plan'; btn.disabled = false;
  }
});

document.getElementById('back-btn').addEventListener('click', () => {
  if (step > 1) { step--; render(); }
});

// Init
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  // Pre-fill name from auth
  if (!answers.name && user.displayName) answers.name = user.displayName.split(' ')[0];
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  render();
});
</script>
</body>
</html>
