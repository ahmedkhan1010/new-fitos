<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nutrition — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>
<div class="app-shell" id="page" style="display:none">
  <div class="main-content">
    <div class="topbar">
      <div class="page-title"><h1>Nutrition</h1><p>Track macros and calories</p></div>
      <div class="topbar-actions">
        <button class="hamburger" id="hamburger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <a href="nutrition-history.html" class="btn btn-secondary btn-sm">History</a>
        <a href="nutrition-log.html" class="btn btn-primary btn-sm">+ Log Food</a>
      </div>
    </div>

    <div class="page-content">
      <!-- Date selector -->
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px" id="date-tabs" class="tab-scroller"></div>

      <!-- Calorie ring + macros -->
      <div class="card card-brand mb-6" style="margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
          <div class="macro-ring" style="width:130px;height:130px;flex-shrink:0">
            <svg viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--border)" stroke-width="3"/>
              <circle id="cal-arc" cx="18" cy="18" r="15.9" fill="none" stroke="var(--brand)" stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round" style="transition:stroke-dasharray .6s ease"/>
            </svg>
            <div class="macro-ring-inner">
              <div class="ring-value" id="ring-cal">0</div>
              <div class="ring-label">kcal</div>
              <div style="font-size:.6rem;color:var(--text-3)" id="ring-goal">/ 0</div>
            </div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:14px;min-width:180px">
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <span style="font-size:.875rem;font-weight:600">Protein</span>
                <span style="font-size:.875rem;color:var(--brand);font-weight:700"><span id="p-cur">0</span>g / <span id="p-goal">0</span>g</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="p-bar" style="width:0%"></div></div>
            </div>
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <span style="font-size:.875rem;font-weight:600">Carbohydrates</span>
                <span style="font-size:.875rem;color:var(--accent);font-weight:700"><span id="c-cur">0</span>g / <span id="c-goal">0</span>g</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="c-bar" style="width:0%;background:var(--accent)"></div></div>
            </div>
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <span style="font-size:.875rem;font-weight:600">Fat</span>
                <span style="font-size:.875rem;color:var(--warning);font-weight:700"><span id="f-cur">0</span>g / <span id="f-goal">0</span>g</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="f-bar" style="width:0%;background:var(--warning)"></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Meals logged today -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">Today's Log</div>
          <a href="nutrition-log.html" class="btn btn-primary btn-sm">+ Add Food</a>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div id="food-log-today"></div>
        </div>
      </div>

      <!-- Weekly summary -->
      <div class="section">
        <div class="section-title" style="margin-bottom:14px">7-Day Averages</div>
        <div class="metric-grid">
          <div class="metric-card"><div class="metric-label">Avg Calories</div><div class="metric-value" id="avg-cal">—</div><div class="metric-sub">per day</div></div>
          <div class="metric-card"><div class="metric-label">Avg Protein</div><div class="metric-value" id="avg-p">—</div><div class="metric-sub">grams/day</div></div>
          <div class="metric-card"><div class="metric-label">Days Logged</div><div class="metric-value" id="days-logged">0</div><div class="metric-sub">this week</div></div>
          <div class="metric-card"><div class="metric-label">Best Day</div><div class="metric-value" id="best-cal">—</div><div class="metric-sub">calories</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="nav.js"></script>
<script>
let profile, goals = {}, activeDate = todayStr(), unsubNutrition, currentUser, todayLog = null;

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  profile = await FS.getProfile(user.uid);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  buildNav('nutrition.html');

  goals = calcGoals(profile);
  document.getElementById('p-goal').textContent = goals.protein;
  document.getElementById('c-goal').textContent = goals.carbs;
  document.getElementById('f-goal').textContent = goals.fat;
  document.getElementById('ring-goal').textContent = `/ ${goals.calories}`;

  renderDateTabs();
  loadNutrition(user.uid, activeDate);

  // Weekly stats
  const history = await FS.getNutritionHistory(user.uid, 7);
  if (history.length) {
    const avgCal = Math.round(history.reduce((s,l)=>s+(l.totalCalories||0),0)/history.length);
    const avgP   = Math.round(history.reduce((s,l)=>s+(l.totalProtein||0),0)/history.length);
    const bestCal = Math.max(...history.map(l=>l.totalCalories||0));
    document.getElementById('avg-cal').textContent  = avgCal;
    document.getElementById('avg-p').textContent    = avgP + 'g';
    document.getElementById('days-logged').textContent = history.length;
    document.getElementById('best-cal').textContent = bestCal;
  }
});

function calcGoals(p) {
  const w = p?.weight||70; const h = p?.height||170; const a = p?.age||25;
  const bmr = p?.gender==='Female' ? 447.6+9.25*w+3.1*h-4.33*a : 88.4+13.4*w+4.8*h-5.68*a;
  const af = 1.375;
  let cal = Math.round(bmr * af);
  if ((p?.primaryGoal||'').includes('Lose Fat')) cal -= 400;
  else if ((p?.primaryGoal||'').includes('Muscle')||(p?.primaryGoal||'').includes('Strength')) cal += 300;
  return { calories:cal, protein:Math.round(w*1.8), carbs:Math.round(cal*0.45/4), fat:Math.round(cal*0.25/9) };
}

function renderDateTabs() {
  const el = document.getElementById('date-tabs');
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }
  el.innerHTML = dates.map(d => {
    const label = d === todayStr() ? 'Today' : new Date(d).toLocaleDateString('en-IN',{weekday:'short',day:'numeric'});
    return `<button onclick="switchDate('${d}')" id="tab-${d}"
      class="btn ${d===activeDate?'btn-primary':'btn-secondary'} btn-sm" style="white-space:nowrap;flex-shrink:0">${label}</button>`;
  }).join('');
}

function switchDate(date) {
  activeDate = date;
  renderDateTabs();
  if (unsubNutrition) unsubNutrition();
  auth.currentUser && loadNutrition(auth.currentUser.uid, date);
}

function loadNutrition(uid, date) {
  if (unsubNutrition) unsubNutrition();
  unsubNutrition = FS.onNutritionToday(uid, date, data => {
    updateDisplay(data);
  });
}

function updateDisplay(data) {
  todayLog = data;
  const cal = data?.totalCalories||0;
  const p   = data?.totalProtein||0;
  const c   = data?.totalCarbs||0;
  const f   = data?.totalFat||0;
  document.getElementById('ring-cal').textContent = cal;
  const arc = Math.min(100, pct(cal, goals.calories));
  document.getElementById('cal-arc').setAttribute('stroke-dasharray', `${arc} 100`);
  document.getElementById('p-cur').textContent = p;
  document.getElementById('c-cur').textContent = c;
  document.getElementById('f-cur').textContent = f;
  document.getElementById('p-bar').style.width = `${pct(p,goals.protein)}%`;
  document.getElementById('c-bar').style.width = `${pct(c,goals.carbs)}%`;
  document.getElementById('f-bar').style.width = `${pct(f,goals.fat)}%`;

  const logEl = document.getElementById('food-log-today');
  const entries = data?.entries||[];
  if (!entries.length) {
    logEl.innerHTML = `<div class="empty" style="padding:32px"><div class="empty-icon">🥗</div><h3>Nothing logged</h3><p>Tap + Add Food to log your meals.</p><a href="nutrition-log.html" class="btn btn-primary" style="margin-top:12px">Log Food →</a></div>`;
    return;
  }
  logEl.innerHTML = entries.map((e,i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:600;font-size:.9rem">${e.name}</div>
        <div style="font-size:.75rem;color:var(--text-2)">${e.serving} · P:${e.protein}g C:${e.carbs}g F:${e.fat}g</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-weight:700;color:var(--brand)">${e.calories} kcal</span>
        <button onclick="removeEntry('${data.logId}',${i})" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px">×</button>
      </div>
    </div>`).join('');
}

let removingEntry = false;
async function removeEntry(logId, idx) {
  if (removingEntry) return;
  removingEntry = true;
  try {
    const data = todayLog || await FS.getTodayNutrition(currentUser.uid, activeDate) || { entries: [] };
    const entries = [...(data.entries||[])];
    entries.splice(idx,1);
    const totals = entries.reduce((acc,e) => ({
      totalCalories: acc.totalCalories + (e.calories||0),
      totalProtein:  acc.totalProtein  + (e.protein||0),
      totalCarbs:    acc.totalCarbs    + (e.carbs||0),
      totalFat:      acc.totalFat      + (e.fat||0),
    }), {totalCalories:0,totalProtein:0,totalCarbs:0,totalFat:0});
    await FS.saveNutritionLog(currentUser.uid, { logId, date: activeDate, entries, ...totals });
    showToast('Food entry removed.', 'success');
  } catch (e) {
    showToast('Could not remove entry. Try again.', 'error');
  } finally {
    removingEntry = false;
  }
}
</script>
</body>
</html>
