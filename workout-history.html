<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#f7f7fb" id="meta-theme-color"/>
<title>Workout History — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>
<div class="app-shell" id="page" style="display:none">
  <div class="main-content">
    <div class="topbar">
      <div class="page-title"><h1>Workout History</h1><p>Every session you've ever logged</p></div>
      <div class="topbar-actions">
        <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <a href="workout-current.html" class="btn btn-primary btn-sm">▶ New Workout</a>
      </div>
    </div>

    <div class="page-content">
      <!-- Summary stats -->
      <div class="metric-grid" style="margin-bottom:24px">
        <div class="metric-card"><div class="metric-label">Total Workouts</div><div class="metric-value" id="total-workouts">0</div><div class="metric-sub">all time</div></div>
        <div class="metric-card"><div class="metric-label">Total Sets</div><div class="metric-value" id="total-sets">0</div><div class="metric-sub">all time</div></div>
        <div class="metric-card"><div class="metric-label">Avg Duration</div><div class="metric-value" id="avg-duration">0</div><div class="metric-sub">minutes</div></div>
        <div class="metric-card"><div class="metric-label">This Month</div><div class="metric-value" id="month-count">0</div><div class="metric-sub">sessions</div></div>
      </div>

      <!-- History list -->
      <div id="history-container">
        <div class="empty"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Session detail modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
    <button class="btn btn-secondary btn-full" style="margin-top:14px" onclick="closeDetail()">Close</button>
  </div>
</div>

<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="nav.js"></script>
<script>
let logs = [];

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  buildNav('workouts.html');

  logs = await FS.getWorkoutLogs(user.uid, 200);

  // Stats
  document.getElementById('total-workouts').textContent = logs.length;
  document.getElementById('total-sets').textContent = logs.reduce((s,l) => s+(l.totalSets||0), 0);
  const durs = logs.filter(l=>l.duration).map(l=>l.duration);
  document.getElementById('avg-duration').textContent = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : '—';
  const now = new Date(); const monthStart = new Date(now.getFullYear(),now.getMonth(),1);
  document.getElementById('month-count').textContent = logs.filter(l => {
    const ts = toTimeValue(l);
    return ts >= monthStart.getTime();
  }).length;

  renderHistory();
});

function renderHistory() {
  const container = document.getElementById('history-container');
  if (!logs.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🏋️</div><h3>No workouts logged yet</h3><p>Complete your first workout to see it here.</p><a href="workout-current.html" class="btn btn-primary" style="margin-top:14px">Start First Workout →</a></div>';
    return;
  }
  // Group by month
  const groups = {};
  logs.forEach(l => {
    const ts = toTimeValue(l);
    const d = ts ? new Date(ts) : new Date();
    const key = d.toLocaleDateString('en-IN', { month:'long', year:'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(l);
  });

  container.innerHTML = Object.entries(groups).map(([month, sessions]) => `
    <div class="section">
      <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);margin-bottom:10px">${month}</div>
      <div class="card" style="padding:0;overflow:hidden">
        ${sessions.map((l,i) => `
          <div onclick="openDetail(${logs.indexOf(l)})" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:${i<sessions.length-1?'1px solid var(--border)':'none'};cursor:pointer;transition:background .15s" onmouseenter="this.style.background='var(--card-hover)'" onmouseleave="this.style.background=''">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:38px;height:38px;border-radius:10px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">🏋️</div>
              <div>
                <div style="font-weight:600">${esc(l.workoutDay) || 'Workout'}</div>
                <div style="font-size:.75rem;color:var(--text-2)">${formatDate(l.date || l.createdAt?.toDate?.()?.toISOString()?.slice(0,10))} · ${l.exercises?.length||0} exercises · ${l.duration||'?'} min · ${l.totalSets||0} sets</div>
              </div>
            </div>
            <span class="badge badge-green">✓</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function openDetail(idx) {
  const l = logs[idx];
  if (!l) return;
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="modal-title">${esc(l.workoutDay) || 'Workout'}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <span class="badge badge-brand">${formatDate(l.date||l.createdAt?.toDate?.()?.toISOString()?.slice(0,10))}</span>
      <span class="badge badge-purple">${l.duration||'?'} min</span>
      <span class="badge badge-green">${l.totalSets||0} sets</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
      ${(l.exercises||[]).map(ex => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.875rem">
          <span style="font-weight:500">${esc(ex.name)}</span>
          <span style="color:${ex.setsCompleted>=ex.totalSets?'var(--success)':'var(--text-2)'}">${ex.setsCompleted||0}/${ex.totalSets||0} sets × ${ex.reps}</span>
        </div>`).join('')}
    </div>
    ${l.notes ? `<div class="alert alert-brand"><span style="font-size:.8125rem">📝 ${esc(l.notes)}</span></div>` : ''}`;
  document.getElementById('detail-modal').classList.add('show');
}
function closeDetail() { document.getElementById('detail-modal').classList.remove('show'); }
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-modal')) closeDetail();
});
</script>
</body>
</html>
