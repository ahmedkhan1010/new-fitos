<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Workouts — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>
<div class="app-shell" id="page" style="display:none">
  <div class="main-content">
    <div class="topbar">
      <div class="page-title">
        <h1>Workouts</h1>
        <p>Your training program & history</p>
      </div>
      <div class="topbar-actions">
        <button class="hamburger" id="hamburger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <a href="workout-current.html" class="btn btn-primary btn-sm">▶ Start Workout</a>
      </div>
    </div>

    <div class="page-content">
      <!-- Plan overview -->
      <div class="card card-brand mb-6" style="margin-bottom:24px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
          <div>
            <div class="label" style="margin-bottom:6px">Active Plan</div>
            <h2 id="plan-name" style="font-size:1.375rem;margin-bottom:4px">Loading…</h2>
            <p id="plan-meta" style="font-size:.875rem;color:var(--text-2)"></p>
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-secondary btn-sm" id="view-history-btn" onclick="location.href='workout-history.html'">View History</button>
            <button class="btn btn-secondary btn-sm" id="new-plan-btn">New Plan</button>
          </div>
        </div>
      </div>

      <!-- Weekly split -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">Your Weekly Schedule</div>
          <span id="split-badge" class="badge badge-brand"></span>
        </div>
        <div id="workout-days" style="display:flex;flex-direction:column;gap:12px"></div>
      </div>

      <!-- Stats row -->
      <div class="section">
        <div class="section-title" style="margin-bottom:14px">Monthly Stats</div>
        <div class="metric-grid">
          <div class="metric-card">
            <div class="metric-label">Workouts</div>
            <div class="metric-value" id="stat-total">0</div>
            <div class="metric-sub">this month</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Volume</div>
            <div class="metric-value" id="stat-volume">0</div>
            <div class="metric-sub">total sets</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Avg Duration</div>
            <div class="metric-value" id="stat-duration">0</div>
            <div class="metric-sub">minutes</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Best Streak</div>
            <div class="metric-value" id="stat-streak">0</div>
            <div class="metric-sub">weeks</div>
          </div>
        </div>
      </div>

      <!-- Recent logs -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">Recent Sessions</div>
          <a href="workout-history.html" class="btn btn-ghost btn-sm">All →</a>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div id="recent-logs"><div class="empty" style="padding:32px"><div class="empty-icon">🏋️</div><h3>No workouts yet</h3><p>Start your first session and it will appear here.</p></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="nav.js"></script>
<script>
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  buildNav('workouts.html');

  const [plan, logs] = await Promise.all([
    FS.getActivePlan(user.uid),
    FS.getWorkoutLogs(user.uid, 60)
  ]);

  if (plan) {
    document.getElementById('plan-name').textContent = plan.splitType + ' Program';
    document.getElementById('plan-meta').textContent = `${plan.workoutDays} days/week · Goal: ${plan.primaryGoal}`;
    document.getElementById('split-badge').textContent = plan.splitType;

    // Render workout days
    const daysEl = document.getElementById('workout-days');
    daysEl.innerHTML = (plan.weeks || []).map((w, i) => `
      <div class="card card-sm" style="cursor:pointer" onclick="toggleDay(${i})">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem">${i+1}</div>
            <div>
              <div style="font-weight:600">${w.day}</div>
              <div style="font-size:.75rem;color:var(--text-2)">${w.exercises.length} exercises</div>
            </div>
          </div>
          <svg id="arrow-${i}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s;color:var(--text-3)"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div id="day-body-${i}" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
          <div style="display:flex;flex-direction:column;gap:8px">
            ${w.exercises.map(ex => `
              <div style="display:flex;justify-content:space-between;align-items:center;font-size:.875rem">
                <span style="font-weight:500">${ex.name}</span>
                <span style="color:var(--text-2)">${ex.sets} × ${ex.reps} · ${ex.rest}s rest</span>
              </div>`).join('')}
          </div>
          <a href="workout-current.html" class="btn btn-primary btn-sm" style="margin-top:14px">Start ${w.day} →</a>
        </div>
      </div>`).join('');
  } else {
    document.getElementById('plan-name').textContent = 'No active plan';
    document.getElementById('plan-meta').textContent = 'Complete onboarding to generate your plan.';
  }

  // Stats
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthly = logs.filter(l => (l.createdAt?.toDate?.() || new Date(0)) >= monthStart);
  document.getElementById('stat-total').textContent = monthly.length;
  document.getElementById('stat-volume').textContent = monthly.reduce((s, l) => s + (l.totalSets || 0), 0);
  const durations = monthly.filter(l => l.duration).map(l => l.duration);
  document.getElementById('stat-duration').textContent = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : '—';
  document.getElementById('stat-streak').textContent = calcStreak(logs);

  // Recent logs
  const recentEl = document.getElementById('recent-logs');
  if (logs.length) {
    recentEl.innerHTML = logs.slice(0, 8).map(l => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:600">${l.workoutDay || 'Workout'}</div>
          <div style="font-size:.75rem;color:var(--text-2)">${formatDate(l.date || l.createdAt?.toDate?.()?.toISOString()?.slice(0,10))} · ${l.exercises?.length || 0} exercises · ${l.duration || '?'} min</div>
        </div>
        <span class="badge badge-green">✓ Done</span>
      </div>`).join('');
  }
});

function toggleDay(i) {
  const body = document.getElementById(`day-body-${i}`);
  const arrow = document.getElementById(`arrow-${i}`);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  arrow.style.transform = open ? '' : 'rotate(180deg)';
}

function calcStreak(logs) {
  if (!logs.length) return 0;
  const weeks = new Set(logs.map(l => {
    const d = l.createdAt?.toDate?.() || new Date();
    return `${d.getFullYear()}-${Math.ceil(((d - new Date(d.getFullYear(),0,1))/86400000 + new Date(d.getFullYear(),0,1).getDay()+1)/7)}`;
  }));
  const now = new Date(); let streak = 0;
  for (let i = 0; i < 52; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i*7);
    const key = `${d.getFullYear()}-${Math.ceil(((d - new Date(d.getFullYear(),0,1))/86400000 + new Date(d.getFullYear(),0,1).getDay()+1)/7)}`;
    if (weeks.has(key)) streak++; else break;
  }
  return streak;
}
</script>
</body>
</html>
