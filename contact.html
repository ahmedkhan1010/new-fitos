<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav class="land-nav">
  <a href="index.html" style="display:flex;align-items:center;gap:10px"><div class="logo-mark">F</div><span class="logo-text">Fit<span>OS</span></span></a>
  <div class="land-nav-actions">
    <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
    <a href="signup.html" class="btn btn-primary btn-sm">Start Free</a>
  </div>
</nav>
<div style="max-width:560px;margin:0 auto;padding:100px 24px 80px">
  <h1 style="margin-bottom:8px">Contact Us</h1>
  <p style="color:var(--text-2);margin-bottom:32px">Questions, feedback, or support? We'll reply within 24 hours.</p>
  <div class="auth-card">
    <div id="success-msg" style="display:none" class="alert alert-brand" style="margin-bottom:16px">✅ Message sent! We'll reply within 24 hours.</div>
    <form id="contact-form">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group"><label class="form-label">Your Name</label><input type="text" id="c-name" class="form-control" placeholder="Alex Johnson" required/></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" id="c-email" class="form-control" placeholder="you@example.com" required/></div>
        <div class="form-group"><label class="form-label">Subject</label>
          <select id="c-subject" class="form-control">
            <option>General Inquiry</option><option>Bug Report</option><option>Feature Request</option>
            <option>Account Issue</option><option>Privacy Request</option><option>Billing</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Message</label><textarea id="c-message" class="form-control" rows="4" placeholder="Tell us how we can help…" required></textarea></div>
        <button type="submit" class="btn btn-primary btn-full" id="send-btn">Send Message →</button>
      </div>
    </form>
  </div>
  <div class="card" style="margin-top:20px;text-align:center;padding:20px">
    <div style="font-size:.875rem;color:var(--text-2);margin-bottom:8px">Or reach us directly:</div>
    <a href="mailto:support@fitos.app" style="color:var(--brand);font-weight:600">support@fitos.app</a>
    <div style="font-size:.75rem;color:var(--text-3);margin-top:4px">Response time: typically under 24 hours</div>
  </div>
</div>
<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="foods.js"></script>
<script>
document.getElementById('contact-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('send-btn');
  btn.textContent = 'Sending…'; btn.disabled = true;
  // Save to Firestore contact_messages collection
  try {
    await db.collection('contact_messages').add({
      name:    document.getElementById('c-name').value.trim(),
      email:   document.getElementById('c-email').value.trim(),
      subject: document.getElementById('c-subject').value,
      message: document.getElementById('c-message').value.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    document.getElementById('contact-form').reset();
    document.getElementById('success-msg').style.display = 'block';
    showToast('Message sent!', 'success');
  } catch(e) {
    showToast('Error sending. Please email us directly.', 'error');
  }
  btn.textContent = 'Send Message →'; btn.disabled = false;
});
</script>
</body>
</html>
