<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Current Workout — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>
<div class="app-shell" id="page" style="display:none">
  <div class="main-content">
    <div class="topbar">
      <div class="page-title">
        <h1 id="workout-title">Today's Workout</h1>
        <p id="timer-display" style="font-size:.875rem;color:var(--brand);font-weight:600">⏱ 0:00</p>
      </div>
      <div class="topbar-actions">
        <button class="hamburger" id="hamburger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <button class="btn btn-danger btn-sm" id="finish-btn">Finish Workout</button>
      </div>
    </div>

    <div class="page-content">
      <!-- Day selector -->
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px" id="day-tabs"></div>

      <!-- Progress bar -->
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;font-size:.8125rem;margin-bottom:6px">
          <span style="color:var(--text-2)">Exercises completed</span>
          <span style="font-weight:700;color:var(--brand)" id="progress-label">0 / 0</span>
        </div>
        <div class="progress-bar" style="height:8px"><div class="progress-fill" id="main-progress" style="width:0%"></div></div>
      </div>

      <!-- Exercise list -->
      <div id="exercise-list" style="display:flex;flex-direction:column;gap:12px"></div>

      <!-- Notes area -->
      <div class="card mt-6" style="margin-top:24px">
        <div class="section-title" style="margin-bottom:10px">Session Notes</div>
        <textarea id="session-notes" class="form-control" rows="3" placeholder="How do you feel? Any PRs? Notes on form…" style="resize:vertical"></textarea>
      </div>

      <button class="btn btn-primary btn-full btn-lg mt-4" id="finish-bottom" style="margin-top:20px">✅ Finish & Save Workout</button>
    </div>
  </div>
</div>

<!-- Finish modal -->
<div class="modal-overlay" id="finish-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🎉 Great work!</div>
    <p style="color:var(--text-2);font-size:.875rem;margin-bottom:16px">You crushed <span id="modal-exercises">0</span> exercises in <span id="modal-time">0</span> minutes. This workout has been saved to Firestore.</p>
    <div class="card card-sm" style="margin-bottom:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
        <div><div style="font-size:1.375rem;font-weight:800;color:var(--brand)" id="done-exercises">0</div><div style="font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">Exercises</div></div>
        <div><div style="font-size:1.375rem;font-weight:800" id="done-sets">0</div><div style="font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">Sets</div></div>
        <div><div style="font-size:1.375rem;font-weight:800" id="done-time">0</div><div style="font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">Minutes</div></div>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <a href="workouts.html" class="btn btn-secondary" style="flex:1">View History</a>
      <a href="dashboard.html" class="btn btn-primary" style="flex:1">Dashboard →</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="nav.js"></script>
<script>
let currentUser, plan, activeDayIdx = 0, startTime = Date.now(), timerInterval;
let exerciseState = [];

async function getUserProfile(user) {
  let profile = await FS.getProfile(user.uid);
  if (!profile) {
    profile = await FS.ensureProfile(user.uid, {
      name: user.displayName || user.email?.split('@')[0] || 'Athlete',
      email: user.email || '',
      onboardingDone: false,
    });
  }
  return profile;
}

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  const profile = await getUserProfile(user);
  plan = await FS.getActivePlan(user.uid);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  buildNav('workouts.html');

  if (!plan || !plan.weeks || !plan.weeks.length) {
    document.getElementById('exercise-list').innerHTML = '<div class="empty"><div class="empty-icon">📋</div><h3>No plan found</h3><p>Complete onboarding to generate your workout plan.</p><a href="onboarding.html" class="btn btn-primary" style="margin-top:14px">Set Up Plan →</a></div>';
    return;
  }

  const dow = new Date().getDay();
  activeDayIdx = dow % plan.weeks.length;
  startTimer();
  renderDayTabs();
  renderExercises();
});

function startTimer() {
  startTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer-display').textContent = `⏱ ${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function renderDayTabs() {
  const el = document.getElementById('day-tabs');
  el.innerHTML = plan.weeks.map((w, i) => `
    <button onclick="switchDay(${i})" id="tab-${i}"
      class="btn ${i===activeDayIdx?'btn-primary':'btn-secondary'} btn-sm"
      style="white-space:nowrap;flex-shrink:0">${w.day}</button>`).join('');
}

function switchDay(i) {
  activeDayIdx = i;
  exerciseState = [];
  renderDayTabs();
  renderExercises();
}

function renderExercises() {
  const day = plan.weeks[activeDayIdx];
  document.getElementById('workout-title').textContent = day.day;
  const exs = day.exercises || [];
  if (!exerciseState.length) {
    exerciseState = exs.map(ex => ({ setsCompleted: 0, totalSets: parseInt(ex.sets) || 3, open: false }));
  }
  updateProgress();
  const el = document.getElementById('exercise-list');
  el.innerHTML = exs.map((ex, i) => {
    const st = exerciseState[i];
    const done = st.setsCompleted >= st.totalSets;
    const dots = Array(st.totalSets).fill('').map((_, d) => `<div class="set-dot ${d < st.setsCompleted ? 'filled' : ''}"></div>`).join('');
    return `
    <div class="exercise-card ${done?'done':''} ${st.open?'active':''}" id="ex-card-${i}">
      <div class="exercise-header" onclick="toggleExercise(${i})">
        <div class="exercise-number">${done ? '✓' : i+1}</div>
        <div style="flex:1">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-meta">${ex.sets} sets × ${ex.reps} · ${ex.rest}s rest</div>
        </div>
        <div class="exercise-progress">${st.setsCompleted}/${st.totalSets}</div>
      </div>
      <div class="exercise-body ${st.open?'open':''}">
        <div class="set-dots">${dots}</div>
        ${ex.notes ? `<div class="alert alert-brand" style="margin-bottom:12px;padding:8px 12px;font-size:.8rem">💡 ${ex.notes}</div>` : ''}
        <div style="display:flex;gap:8px">
          <button onclick="completeSet(${i})" class="btn btn-primary" ${done?'disabled':''} style="flex:1">
            ${done ? '✅ All Done' : `Complete Set ${st.setsCompleted+1}`}
          </button>
          ${st.setsCompleted > 0 ? `<button onclick="undoSet(${i})" class="btn btn-secondary">Undo</button>` : ''}
        </div>
        ${!done ? `<div style="margin-top:10px;font-size:.8rem;color:var(--text-3);text-align:center">Rest ${ex.rest}s after each set</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleExercise(i) { exerciseState[i].open = !exerciseState[i].open; renderExercises(); }
function completeSet(i) {
  const st = exerciseState[i];
  if (st.setsCompleted < st.totalSets) {
    st.setsCompleted++;
    if (st.setsCompleted < st.totalSets) {
      const rest = parseInt(plan.weeks[activeDayIdx].exercises[i].rest) || 90;
      startRestTimer(i, rest);
    }
  }
  renderExercises();
}
function undoSet(i) { if (exerciseState[i].setsCompleted > 0) exerciseState[i].setsCompleted--; renderExercises(); }

function startRestTimer(exIdx, seconds) {
  let remaining = seconds;
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = `⏸ Rest: ${remaining}s`;
  document.getElementById('toast-container').appendChild(toast);
  const t = setInterval(() => {
    remaining--;
    toast.textContent = remaining > 0 ? `⏸ Rest: ${remaining}s` : '🔔 Rest done! Next set!';
    if (remaining <= 0) {
      clearInterval(t);
      setTimeout(() => toast.remove(), 2000);
    }
  }, 1000);
}

function updateProgress() {
  const total = exerciseState.length;
  const done  = exerciseState.filter(s => s.setsCompleted >= s.totalSets).length;
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
  document.getElementById('main-progress').style.width = `${total ? pct(done, total) : 0}%`;
}

async function finishWorkout() {
  clearInterval(timerInterval);
  const elapsed = Math.round((Date.now() - startTime) / 60000);
  const day = plan.weeks[activeDayIdx];
  const totalSets = exerciseState.reduce((s, st) => s + st.setsCompleted, 0);
  const doneExercises = exerciseState.filter(s => s.setsCompleted > 0).length;

  const log = {
    date: todayStr(),
    workoutDay: day.day,
    planId: plan.planId,
    exercises: day.exercises.map((ex, i) => ({
      name: ex.name,
      setsCompleted: exerciseState[i].setsCompleted,
      totalSets: exerciseState[i].totalSets,
      reps: ex.reps,
    })),
    duration: elapsed,
    totalSets,
    notes: document.getElementById('session-notes').value.trim(),
  };

  try {
    await FS.logWorkout(currentUser.uid, log);
    document.getElementById('modal-exercises').textContent = doneExercises;
    document.getElementById('modal-time').textContent = elapsed;
    document.getElementById('done-exercises').textContent = doneExercises;
    document.getElementById('done-sets').textContent = totalSets;
    document.getElementById('done-time').textContent = elapsed;
    document.getElementById('finish-modal').classList.add('show');
  } catch(err) {
    showToast('Error saving workout. Please try again.', 'error');
  }
}

document.getElementById('finish-btn').addEventListener('click', finishWorkout);
document.getElementById('finish-bottom').addEventListener('click', finishWorkout);
</script>
</body>
</html>
