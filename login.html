<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Log In — FitOS</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<div class="auth-page" id="page" style="display:none">
  <div class="auth-card animate-up">
    <div class="auth-logo">
      <div class="logo-mark">F</div>
      <span class="logo-text">Fit<span>OS</span></span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to continue your training journey.</p>

    <button class="btn btn-secondary btn-full" id="google-btn" style="gap:10px">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider">or continue with email</div>

    <form id="login-form">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label class="form-label">Password</label>
            <a href="#" id="forgot-link" style="font-size:.75rem;color:var(--brand)">Forgot password?</a>
          </div>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      </div>
    </form>

    <div id="error-msg" style="display:none" class="alert alert-danger mt-3"></div>

    <p class="auth-footer">Don't have an account? <a href="signup.html">Create one free →</a></p>
  </div>
</div>

<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<script src="firebase-init.js"></script>
<script>
const loadingEl = document.getElementById('loading');
const pageEl    = document.getElementById('page');
const errorEl   = document.getElementById('error-msg');
let handledRoute = false;

async function ensureUserProfile(user) {
  try {
    let profile = await FS.getProfile(user.uid);
    if (!profile) {
      profile = await FS.ensureProfile(user.uid, {
        name: user.displayName || user.email?.split('@')[0] || 'Athlete',
        email: user.email || '',
        onboardingDone: false,
      });
    }
    return profile;
  } catch (err) {
    const fallback = {
      uid: user.uid,
      name: user.displayName || user.email?.split('@')[0] || 'Athlete',
      email: user.email || '',
      onboardingDone: false,
    };
    try { localStorage.setItem(`fitos_profile_${user.uid}`, JSON.stringify(fallback)); } catch (e) {}
    return fallback;
  }
}

async function routeUser(user) {
  if (handledRoute || !user) return;
  handledRoute = true;
  try {
    const profile = await ensureUserProfile(user);
    window.location.href = profile?.onboardingDone ? 'dashboard.html' : 'onboarding.html';
  } catch (err) {
    window.location.href = 'onboarding.html';
  }
}

const redirectResult = auth.getRedirectResult().catch(() => null);
redirectResult.then(result => {
  if (result?.user) routeUser(result.user);
});

auth.onAuthStateChanged(async user => {
  if (user) { routeUser(user); }
  else if (!handledRoute) {
    loadingEl.style.display = 'none';
    pageEl.style.display = 'flex';
  }
});

function showError(msg) {
  errorEl.style.display = 'block';
  errorEl.textContent = msg;
}

function friendly(code) {
  const map = {
    'auth/user-not-found':   'No account found with this email.',
    'auth/wrong-password':   'Incorrect password. Try again.',
    'auth/invalid-email':    'Please enter a valid email address.',
    'auth/too-many-requests':'Too many attempts. Please wait a moment.',
    'auth/user-disabled':    'This account has been disabled.',
    'auth/invalid-credential': 'Email or password is incorrect.',
    'auth/popup-blocked':    'Popup blocked. Falling back to redirect sign-in.',
    'auth/operation-not-supported-in-this-environment': 'Google sign-in is not supported in this browser mode.',
    'auth/unauthorized-domain': 'This domain is not authorized for Google sign-in yet. Add it under Firebase Console → Authentication → Settings → Authorized domains.',
    'auth/operation-not-allowed': 'Google sign-in is not enabled for this project. Turn it on in Firebase Console → Authentication → Sign-in method → Google.',
    'auth/internal-error': 'Google could not complete sign-in (internal error). This is usually a misconfigured OAuth client — check the Google provider setup in Firebase Console.',
    'auth/network-request-failed': 'Network error. Check your connection and try again.',
    'auth/account-exists-with-different-credential': 'An account already exists with this email using a different sign-in method. Try signing in with email/password instead.',
    'auth/cancelled-popup-request': 'Sign-in was interrupted. Please try again.',
  };
  return map[code] || `Something went wrong${code ? ` (${code})` : ''}. Please try again.`;
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  errorEl.style.display = 'none';
  try {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    logEvent('login', { method:'email' });
    const profile = await ensureUserProfile(cred.user);
    window.location.href = profile?.onboardingDone ? 'dashboard.html' : 'onboarding.html';
  } catch(err) {
    showError(friendly(err.code));
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});

let googleSigningIn = false;
document.getElementById('google-btn').addEventListener('click', async () => {
  if (googleSigningIn) return;
  googleSigningIn = true;
  const gBtn = document.getElementById('google-btn');
  gBtn.disabled = true;
  errorEl.style.display = 'none';
  try {
    const result = await auth.signInWithPopup(googleProvider);
    logEvent('login', { method:'google' });
    await routeUser(result.user);
  } catch(err) {
    console.error('Google sign-in failed:', err.code, err.message, err);
    if (err.code === 'auth/popup-blocked' || err.code === 'auth/operation-not-supported-in-this-environment') {
      try {
        await auth.signInWithRedirect(googleProvider);
        return; // page will navigate away
      } catch (redirectErr) {
        console.error('Google redirect sign-in also failed:', redirectErr.code, redirectErr.message, redirectErr);
        showError(friendly(redirectErr.code));
      }
    } else if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
      showError(friendly(err.code));
    }
  } finally {
    googleSigningIn = false;
    gBtn.disabled = false;
  }
});

document.getElementById('forgot-link').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Enter your email address first.'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showToast('Password reset email sent!', 'success');
  } catch(err) {
    showError(friendly(err.code));
  }
});
</script>
</body>
</html>
