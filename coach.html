<script>
// ── Mode switching ──────────────────────────────────────────
document.getElementById('mode-chat-btn').addEventListener('click', () => switchMode('chat'));
document.getElementById('mode-browse-btn').addEventListener('click', () => switchMode('browse'));
function switchMode(mode) {
  document.getElementById('mode-chat-btn').classList.toggle('active', mode === 'chat');
  document.getElementById('mode-browse-btn').classList.toggle('active', mode === 'browse');
  document.getElementById('chat-mode').style.display = mode === 'chat' ? 'block' : 'none';
  document.getElementById('browse-mode').style.display = mode === 'browse' ? 'block' : 'none';
}

// ── Diagnostic chatbot state machine ───────────────────────
let chatPath = []; // array of { nodeId, label } for breadcrumb
let chatHistorySaved = false;

function startChat() {
  chatPath = [];
  chatHistorySaved = false;
  document.getElementById('chat-scroll').innerHTML = '';
  renderBreadcrumb();
  appendBotMessage("Hey! I'm your FitOS coach. Let's figure out what's going on — pick the area that's closest to your issue.");
  setTimeout(() => renderNode(COACH_TREE_ROOT), 350);
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (!chatPath.length) { el.innerHTML = ''; return; }
  el.innerHTML = chatPath.map(p => `<span>${p.label}</span>`).join('');
}

function appendBotMessage(text, extraHtml = '') {
  const scroll = document.getElementById('chat-scroll');
  const row = document.createElement('div');
  row.className = 'chat-row bot';
  row.innerHTML = `
    <div class="chat-avatar">🤖</div>
    <div style="flex:1;min-width:0">
      <div class="chat-bubble">${text}</div>
      ${extraHtml}
    </div>`;
  scroll.appendChild(row);
  scroll.scrollTop = scroll.scrollHeight;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  return row;
}

function appendUserMessage(text) {
  const scroll = document.getElementById('chat-scroll');
  const row = document.createElement('div');
  row.className = 'chat-row user';
  row.innerHTML = `<div class="chat-bubble">${text}</div>`;
  scroll.appendChild(row);
  scroll.scrollTop = scroll.scrollHeight;
}

function showTypingIndicator() {
  const scroll = document.getElementById('chat-scroll');
  const row = document.createElement('div');
  row.className = 'chat-row bot';
  row.id = 'typing-indicator';
  row.innerHTML = `<div class="chat-avatar">🤖</div><div class="chat-bubble chat-typing"><span></span><span></span><span></span></div>`;
  scroll.appendChild(row);
  scroll.scrollTop = scroll.scrollHeight;
}
function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function renderNode(nodeId) {
  const node = COACH_TREE[nodeId];
  if (!node) { renderNode('fallback'); return; }

  if (node.resolution) {
    renderResolution(node.resolution, nodeId);
    return;
  }

  showTypingIndicator();
  setTimeout(() => {
    removeTypingIndicator();
    const row = appendBotMessage(node.prompt);
    const optsWrap = document.createElement('div');
    optsWrap.className = 'chat-options';
    node.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'chat-option-btn';
      btn.innerHTML = `<span>${opt.label}</span><span class="arrow">→</span>`;
      btn.addEventListener('click', () => {
        optsWrap.querySelectorAll('button').forEach(b => b.disabled = true);
        optsWrap.style.opacity = '.5';
        appendUserMessage(opt.label);
        chatPath.push({ nodeId: opt.next, label: opt.label.replace(/^[^\w]+/, '').trim() });
        renderBreadcrumb();
        setTimeout(() => renderNode(opt.next), 280);
      });
      optsWrap.appendChild(btn);
    });
    row.parentElement.appendChild(optsWrap);
    document.getElementById('chat-scroll').scrollTop = document.getElementById('chat-scroll').scrollHeight;
  }, 450);
}

function renderResolution(resolution, nodeId) {
  showTypingIndicator();
  setTimeout(() => {
    removeTypingIndicator();
    const severityClass = resolution.severity === 'high' ? 'severity-high' : '';
    const icon = resolution.severity === 'high' ? '⚠️' : '✅';
    const ctaHtml = resolution.actions
      ? resolution.actions.map(a =>
          `<a href="${a.href}" class="btn ${a.style === 'primary' ? 'btn-primary' : 'btn-secondary'} btn-sm" style="margin-top:6px;display:flex;align-items:center;justify-content:center">${a.label}</a>`
        ).join('')
      : resolution.cta
        ? `<a href="${resolution.cta.href}" class="btn btn-primary btn-sm" style="margin-top:4px;display:inline-flex">${resolution.cta.label} →</a>`
        : '';
    const cardHtml = `
      <div class="resolution-card ${severityClass}">
        <h4>${icon} ${resolution.title}</h4>
        <ul>${resolution.body.map(b => `<li>${b}</li>`).join('')}</ul>
        ${ctaHtml}
      </div>`;
    const row = appendBotMessage("Here's what I'd suggest:", cardHtml);

    const confirmRow = document.createElement('div');
    confirmRow.className = 'confirm-row';
    confirmRow.innerHTML = `
      <button class="btn btn-secondary" id="not-issue-btn">❌ Not my issue</button>
      <button class="btn btn-primary" id="is-issue-btn">✅ Yes, this is it</button>`;
    row.parentElement.appendChild(confirmRow);

    document.getElementById('is-issue-btn').addEventListener('click', async () => {
      confirmRow.innerHTML = '';
      appendUserMessage('✅ Yes, this is it');
      appendBotMessage("Glad that helped! Feel free to start over if anything else comes up. 💪");
      if (!chatHistorySaved) {
        chatHistorySaved = true;
        try {
          await FS.saveCoachHistory(currentUser.uid, {
            type: 'diagnostic',
            tag: resolution.tag,
            title: resolution.title,
            path: chatPath.map(p => p.label).join(' → '),
          });
          loadHistory();
        } catch (e) {}
      }
    });

    document.getElementById('not-issue-btn').addEventListener('click', () => {
      confirmRow.innerHTML = '';
      appendUserMessage('❌ Not my issue');
      // Walk back up to the nearest ancestor question node that has sibling
      // options we haven't tried, so the user can pick a different branch.
      offerSiblingOrBacktrack(nodeId);
    });

    document.getElementById('chat-scroll').scrollTop = document.getElementById('chat-scroll').scrollHeight;
  }, 450);
}

function offerSiblingOrBacktrack(resolvedNodeId) {
  // Find the parent question node of resolvedNodeId by walking the recorded path.
  // chatPath's last entry led to resolvedNodeId; its parent is the node before that.
  setTimeout(() => {
    appendBotMessage("No problem — let's try another angle. Does one of these fit better?", `
      <div class="chat-options" id="retry-options"></div>
    `);
    const retryWrap = document.getElementById('retry-options');
    const goBackBtn = document.createElement('button');
    goBackBtn.className = 'chat-option-btn';
    goBackBtn.innerHTML = `<span>⬅️ Go back a step and pick differently</span><span class="arrow">→</span>`;
    goBackBtn.addEventListener('click', () => {
      retryWrap.innerHTML = '';
      backtrackOneStep();
    });
    const restartBtn = document.createElement('button');
    restartBtn.className = 'chat-option-btn';
    restartBtn.innerHTML = `<span>🔁 Start over from the main menu</span><span class="arrow">→</span>`;
    restartBtn.addEventListener('click', () => { retryWrap.innerHTML = ''; startChat(); });
    const fallbackBtn = document.createElement('button');
    fallbackBtn.className = 'chat-option-btn';
    fallbackBtn.innerHTML = `<span>🤷 None of this — flag for the team</span><span class="arrow">→</span>`;
    fallbackBtn.addEventListener('click', () => { retryWrap.innerHTML = ''; appendUserMessage('Flag for the team'); renderNode('fallback'); });
    retryWrap.appendChild(goBackBtn);
    retryWrap.appendChild(restartBtn);
    retryWrap.appendChild(fallbackBtn);
  }, 300);
}

function backtrackOneStep() {
  // chatPath[i].nodeId is the node we navigated INTO at step i. The resolution
  // we just rejected lives at chatPath[last].nodeId, whose parent question is
  // chatPath[last-1].nodeId (or root if there's no earlier step).
  if (!chatPath.length) { startChat(); return; }
  chatPath.pop(); // drop the step that led to the rejected resolution
  const parentNodeId = chatPath.length ? chatPath[chatPath.length - 1].nodeId : COACH_TREE_ROOT;
  renderBreadcrumb();
  setTimeout(() => renderNode(parentNodeId), 250);
}

document.getElementById('restart-chat-btn').addEventListener('click', startChat);

</script>

let currentUser, activeCat = 'Strength', activePathway = null;

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
  buildNav('coach.html');
  startChat();
  renderCategoryTabs();
  renderPathways();
  loadHistory();
});

function renderCategoryTabs() {
  const cats = Object.keys(COACH_PATHWAYS);
  document.getElementById('cat-tabs').innerHTML = cats.map(c => `
    <button onclick="switchCat('${c}')" id="cat-${c.replace(/\s/g,'-')}"
      class="btn ${c===activeCat?'btn-primary':'btn-secondary'} btn-sm" style="white-space:nowrap;flex-shrink:0">${c}</button>`).join('');
}

function switchCat(cat) {
  activeCat = cat;
  renderCategoryTabs();
  renderPathways();
}

function renderPathways() {
  const pathways = COACH_PATHWAYS[activeCat] || [];
  document.getElementById('pathways-container').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${pathways.map(p => `
        <div class="pathway-card" onclick="openPathway('${p.id}')">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <div class="pathway-title">${p.title}</div>
              <span class="badge badge-brand" style="flex-shrink:0">${p.level}</span>
            </div>
            <div class="pathway-meta">${p.desc}</div>
            <div style="font-size:.75rem;color:var(--text-3);margin-top:4px">⏱ ${p.duration} · ${p.steps.length} steps</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-3);flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
        </div>`).join('')}
    </div>`;
}

function openPathway(id) {
  let found = null;
  for (const cat of Object.values(COACH_PATHWAYS)) {
    found = cat.find(p => p.id === id);
    if (found) break;
  }
  if (!found) return;
  activePathway = found;
  const el = document.getElementById('result-content');
  el.innerHTML = `
    <div class="modal-title">${found.title}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <span class="badge badge-brand">${found.level}</span>
      <span class="badge badge-purple">⏱ ${found.duration}</span>
    </div>
    <p style="color:var(--text-2);font-size:.875rem;margin-bottom:16px">${found.desc}</p>
    <div style="margin-bottom:16px">
      <div style="font-size:.875rem;font-weight:700;margin-bottom:8px">📋 Step-by-Step Plan</div>
      ${found.steps.map((s,i) => `<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.875rem">
        <span style="color:var(--brand);font-weight:700;flex-shrink:0">${i+1}.</span>
        <span style="color:var(--text-2)">${s}</span>
      </div>`).join('')}
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:.875rem;font-weight:700;margin-bottom:8px">💡 Pro Tips</div>
      ${found.tips.map(t => `<div style="display:flex;gap:8px;padding:6px 0;font-size:.8125rem;color:var(--text-2)">
        <span>•</span><span>${t}</span>
      </div>`).join('')}
    </div>
    <div class="alert alert-brand">
      <span style="font-size:.875rem;font-weight:600">🏆 Coach Recommendation:<br><span style="font-weight:400">${found.recommendation}</span></span>
    </div>`;
  document.getElementById('result-modal').classList.add('show');
}

document.getElementById('save-result-btn').addEventListener('click', async () => {
  if (!activePathway) return;
  try {
    await FS.saveCoachHistory(currentUser.uid, {
      pathwayId:    activePathway.id,
      pathwayTitle: activePathway.title,
      category:     activeCat,
      level:        activePathway.level,
      duration:     activePathway.duration,
    });
    showToast('Pathway saved to your history!', 'success');
    closeModal();
    loadHistory();
  } catch(e) {
    showToast('Error saving. Try again.', 'error');
  }
});

function closeModal() {
  document.getElementById('result-modal').classList.remove('show');
  activePathway = null;
}
document.getElementById('result-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('result-modal')) closeModal();
});

async function loadHistory() {
  const history = await FS.getCoachHistory(currentUser.uid);
  document.getElementById('history-count').textContent = `${history.length} sessions`;
  const el = document.getElementById('coach-history-list');
  if (!history.length) {
    el.innerHTML = '<div class="empty" style="padding:20px 0"><div class="empty-icon">🧠</div><p>No history yet. Ask the coach a question or save a pathway above.</p></div>';
    return;
  }
  el.innerHTML = history.slice(0, 10).map(h => {
    const isDiagnostic = h.type === 'diagnostic';
    const title = isDiagnostic ? h.title : h.pathwayTitle;
    const subtitle = isDiagnostic ? `💬 ${h.path || 'Coach chat'}` : `${h.category} · ${h.level} · ${h.duration}`;
    const rawDate = h.createdAt?.toDate ? h.createdAt.toDate() : (h.createdAt ? new Date(h.createdAt) : null);
    return `
    <div class="card card-sm" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div style="min-width:0">
        <div style="font-weight:600;font-size:.9rem">${title}</div>
        <div style="font-size:.75rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${subtitle}</div>
      </div>
      <div style="font-size:.75rem;color:var(--text-3);flex-shrink:0">${rawDate ? formatDate(rawDate.toISOString().slice(0,10)) : ''}</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
